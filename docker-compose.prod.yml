# Production Docker Compose configuration
# Usage: docker compose -f docker-compose.prod.yml up -d

services:
  postgres:
    image: postgres:16-alpine
    container_name: agent-todo-db
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-agent_todo}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Database password required}
      POSTGRES_DB: ${DB_NAME:-agent_todo}
    volumes:
      - todo_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-agent_todo}"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - formatho_app-network

  backend:
    image: ghcr.io/formatho/agent-todo/backend:latest
    container_name: agent-todo-backend
    restart: always
    environment:
      DATABASE_URL: postgres://${DB_USER:-agent_todo}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-agent_todo}?sslmode=disable
      PORT: 8080
      GIN_MODE: release
      JWT_SECRET: ${JWT_SECRET:?JWT secret required}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - formatho_app-network
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  frontend:
    image: ghcr.io/formatho/agent-todo/frontend:latest
    container_name: agent-todo-frontend
    restart: always
    depends_on:
      - backend
    networks:
      - formatho_app-network

networks:
  formatho_app-network:
    external: true

volumes:
  todo_postgres_data:
