run:
  timeout: 10m
  go: '1.21'
  tests: false

linters:
  disable-all: true
  enable:
    - gofmt
    - govet
    - revive
    - staticcheck
    - gosimple
    - ineffassign
    - unused
    - errcheck
    - goimports
    - misspell
    - gocritic
    - gosec
    - bodyclose
    - contextcheck
    - nilerr
    - noctx
    - unconvert

linters-settings:
  govet:
    enable-all: true
    disable:
      - shadow

  revive:
    severity: warning
    rules:
      - name: blank-imports
      - name: context-as-argument
      - name: context-keys-type
      - name: dot-imports
      - name: error-return
      - name: error-strings
      - name: error-naming
      - name: exported
      - name: if-return
      - name: increment-decrement
      - name: var-naming
      - name: var-declaration
      - name: package-comments
      - name: range
      - name: receiver-naming
      - name: time-naming
      - name: unexported-return
      - name: indent-error-flow
      - name: errorf
      - name: empty-block
      - name: superfluous-else
      - name: unused-parameter
      - name: unreachable-code
      - name: redefines-builtin-id

  errcheck:
    check-type-assertions: true
    check-blank: false

  goimports:
    local-prefixes: github.com/formatho/agent-todo

  gocritic:
    enabled-tags:
      - diagnostic
      - experimental
      - opinionated
      - performance
      - style

  gosec:
    excludes:
      - G104

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
