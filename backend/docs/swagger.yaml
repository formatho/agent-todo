          schema:
            additionalProperties:
              type: string
            type: object
        "403":
          description: Forbidden
          schema:
            additionalProperties:
              type: string
            type: object
        "404":
          description: Not Found
          schema:
            additionalProperties:
              type: string
            type: object
      security:
      - X-API-KEY: []
      summary: Get agent task
      tags:
      - agent
  /agent/tasks/{id}/comments:
