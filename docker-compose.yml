version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: agent-todo-db
    environment:
      POSTGRES_USER: agent_todo
      POSTGRES_PASSWORD: agent_todo_pass
      POSTGRES_DB: agent_todo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agent_todo"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: agent-todo-backend
    environment:
      DATABASE_URL: postgres://agent_todo:agent_todo_pass@postgres:5432/agent_todo?sslmode=disable
      PORT: 8080
      GIN_MODE: release
      JWT_SECRET: your-super-secret-jwt-key-change-this-in-production
      FRONTEND_URL: http://localhost:3000
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agent-todo-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
