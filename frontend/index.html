<!DOCTYPE html>
<html lang="en" class="optimize-performance">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    
    <!-- Core Web Vitals Meta Tags -->
    <meta name="robots" content="index, follow">
    <meta name="google-site-verification" content="google-site-verification-code">
    
    <!-- Performance Optimization Meta Tags -->
    <meta name="format-detection" content="telephone=no">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Agent Todo">
    
    <!-- Critical CSS Preload -->
    <style>
      /* Critical CSS for above-the-fold content */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
        background-color: #f9fafb;
        color: #111827;
        line-height: 1.6;
      }
      
      #app {
        min-height: 100vh;
      }
      
      /* Loading state */
      .loading-spinner {
        display: inline-block;
        width: 20px;
        height: 20px;
        border: 2px solid #f3f4f6;
        border-radius: 50%;
        border-top-color: #3b82f6;
        animation: spin 0.8s linear infinite;
      }
      
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      
      /* Performance optimization classes */
      .optimize-performance {
        will-change: transform;
      }
      
      .optimize-performance * {
        will-change: auto;
      }
    </style>
    
    <!-- Preconnect and DNS-Prefetch for Performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin>
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="dns-prefetch" href="//cdnjs.cloudflare.com">
    <link rel="dns-prefetch" href="//api.formatho.com">
    
    <!-- Font Loading Optimization -->
    <link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"></noscript>
    
    <!-- Favicon and Icons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
    <link rel="mask-icon" href="/safari-pinned-tab.svg" color="#3B82F6">
    
    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.json">
    
    <!-- Theme Color -->
    <meta name="theme-color" content="#3B82F6">
    <meta name="msapplication-TileColor" content="#3B82F6">
    
    <!-- Performance Monitoring -->
    <script>
      // Performance monitoring script
      if ('measurement' in performance && 'PerformanceObserver' in window) {
        const perfObserver = new PerformanceObserver((list) => {
          for (const entry of list.getEntries()) {
            if (entry.entryType === 'largest-contentful-paint') {
              console.log('LCP:', entry.startTime);
            }
            if (entry.entryType === 'first-input') {
              console.log('FID:', entry.processingStart - entry.startTime);
            }
            if (entry.entryType === 'layout-shift') {
              console.log('CLS:', entry.value);
            }
          }
        });
        
        perfObserver.observe({ type: 'largest-contentful-paint', buffered: true });
        perfObserver.observe({ type: 'first-input', buffered: true });
        perfObserver.observe({ type: 'layout-shift', buffered: true });
      }
      
      // Reduce motion preference
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
        document.documentElement.classList.add('reduce-motion');
      }
      
      // Prevent third-party cookies tracking
      document.cookie = 'cookieconsent_status=; path=/; domain=.agent-todo.com; expires=Thu, 01 Jan 1970 00:00:00 UTC;';
    </script>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Agent Todo - AI-powered task management platform for teams and individuals. Organize tasks with AI agents and boost productivity.">
    <meta name="keywords" content="task management, AI, productivity, project management, todo list, team collaboration">
    <meta name="author" content="Agent Todo Team">
    
    <!-- Open Graph Tags -->
    <meta property="og:title" content="Agent Todo - AI-Powered Task Management">
    <meta property="og:description" content="Organize your tasks with AI-powered efficiency and boost productivity">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://todo.formatho.com">
    <meta property="og:image" content="https://todo.formatho.com/og-image.jpg">
    <meta property="og:site_name" content="Agent Todo">
    <meta property="og:locale" content="en_US">
    
    <!-- Twitter Card Tags -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Agent Todo - AI-Powered Task Management">
    <meta name="twitter:description" content="Organize your tasks with AI-powered efficiency and boost productivity">
    <meta name="twitter:image" content="https://todo.formatho.com/twitter-image.jpg">
    
    <!-- Title -->
    <title>Agent Todo - AI-Powered Task Management Platform</title>
  </head>
  
  <body>
    <!-- Loading Indicator -->
    <div id="loading" class="fixed inset-0 bg-gray-50 flex items-center justify-center z-50">
      <div class="text-center">
        <div class="loading-spinner mx-auto mb-4"></div>
        <p class="text-gray-600 text-sm">Loading Agent Todo...</p>
      </div>
    </div>
    
    <!-- Main App Container -->
    <div id="app" class="min-h-screen"></div>
    
    <!-- Main App Script -->
    <script type="module" src="/src/main.js"></script>
    
    <!-- Service Worker Registration (for PWA) - Handled by VitePWA plugin -->
    <!-- VitePWA automatically registers the service worker -->
    
    <!-- Performance Metrics Script -->
    <script>
      // Performance metrics collection
      window.addEventListener('load', () => {
        // Remove loading indicator
        const loading = document.getElementById('loading');
        if (loading) {
          loading.style.opacity = '0';
          loading.style.transition = 'opacity 0.3s ease';
          setTimeout(() => loading.remove(), 300);
        }
        
        // Send performance metrics to analytics
        if (window.gtag) {
          const navigationTiming = performance.getEntriesByType('navigation')[0];
          if (navigationTiming) {
            window.gtag('event', 'page_load_timing', {
              'event_category': 'Performance',
              'event_label': 'Page Load',
              'value_navigation_type': navigationTiming.type,
              'value_dom_content_loaded': navigationTiming.domContentLoadedEventEnd - navigationTiming.domLoading,
              'value_page_load': navigationTiming.loadEventEnd - navigationTiming.navigationStart,
            });
          }
        }
      });
    </script>
  </body>
</html>
